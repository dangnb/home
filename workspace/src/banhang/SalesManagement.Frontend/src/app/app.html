<div class="d-flex flex-column flex-root">
  <div class="page d-flex flex-row flex-column-fluid">

    <!-- Sidebar -->
    <div id="kt_aside" class="aside aside-dark aside-hoverable"
      style="width: 250px; background-color: #1e1e2d; padding: 20px;">
      <div class="aside-logo flex-column-auto"
        style="color: white; font-size: 24px; font-weight: bold; margin-bottom: 30px;">
        NEXUS SALES
      </div>
      <div class="aside-menu flex-column-fluid">
        <ul
          class="menu menu-column menu-title-gray-800 menu-state-title-primary menu-state-icon-primary menu-state-bullet-primary menu-arrow-gray-500"
          style="list-style: none; padding: 0;">
          <li class="menu-item py-2">
            <a routerLink="/" class="menu-link px-3" style="color: #9899ac; text-decoration: none; display: block;"
              [class.text-primary]="isHome()">Dashboard</a>
          </li>
          <li class="menu-item py-2">
            <a routerLink="/sales" class="menu-link px-3" style="color: #9899ac; text-decoration: none; display: block;"
              [class.text-primary]="activeUrl() === '/sales'">Sales Orders</a>
          </li>
          <li class="menu-item py-2">
            <a routerLink="/purchases" class="menu-link px-3"
              style="color: #9899ac; text-decoration: none; display: block;"
              [class.text-primary]="activeUrl() === '/purchases'">Purchase Orders</a>
          </li>
          <li class="menu-item py-2">
            <a routerLink="/categories" class="menu-link px-3"
              style="color: #9899ac; text-decoration: none; display: block;">Categories</a>
          </li>
          <li class="menu-item py-2">
            <a routerLink="/products" class="menu-link px-3"
              style="color: #9899ac; text-decoration: none; display: block;">Products</a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Wrapper -->
    <div class="wrapper d-flex flex-column flex-row-fluid" id="kt_wrapper"
      style="background-color: #f5f8fa; flex-grow: 1;">

      <!-- Header -->
      <div id="kt_header" class="header align-items-stretch"
        style="background: white; border-bottom: 1px solid #EFF2F5; height: 60px; display: flex; align-items: center; padding: 0 30px;">
        <h1 class="fs-4 fw-bolder text-dark mb-0">Hệ thống Quản lý Bán Hàng & Tổng Kho</h1>
      </div>

      <!-- Content -->
      <div class="content d-flex flex-column flex-column-fluid p-8" id="kt_content" style="padding: 30px;">
        <div class="container-xxl" id="kt_content_container">
          <router-outlet></router-outlet>
        </div>
      </div>

    </div>
  </div>
</div>
