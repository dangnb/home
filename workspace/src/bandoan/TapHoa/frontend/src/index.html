<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Tạp Hóa Gần Gũi & Tiện Lợi</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <style>
    /* Pre-bootstrap loader styles */
    .app-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .app-loader .logo-container {
      position: relative;
      margin-bottom: 2rem;
    }
    .app-loader img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      animation: pulse 2s infinite ease-in-out;
    }
    .app-loader .spinner {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border: 3px solid transparent;
      border-top-color: #6366f1;
      border-right-color: #4f46e5;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    .app-loader h2 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: -0.5px;
    }
    .app-loader p {
      margin-top: 0.5rem;
      color: #64748b;
      font-size: 0.95rem;
      font-weight: 500;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>

<body>
  <app-root>
    <div class="app-loader">
      <div class="logo-container">
        <div class="spinner"></div>
        <img src="assets/images/logo.png" alt="TapHoa Logo">
      </div>
      <h2>Đang khởi tạo hệ thống...</h2>
      <p>Vui lòng chờ trong giây lát</p>
    </div>
  </app-root>
  <!-- Bootstrap JS bundle for Dropdowns, Modals, etc. -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>

</html>
