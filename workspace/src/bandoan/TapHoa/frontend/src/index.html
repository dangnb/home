<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Tạp Hóa Gần Gũi & Tiện Lợi</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="apple-touch-icon" href="assets/images/logo.png">
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <style>
    /* Pre-bootstrap loader styles */
    .app-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      background: #F2F2F7;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .app-loader .logo-container {
      position: relative;
      margin-bottom: 2rem;
    }
    .app-loader img {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      background: white;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      animation: pulse 2s infinite ease-in-out;
    }
    .app-loader .spinner {
      position: absolute;
      top: -8px;
      left: -8px;
      right: -8px;
      bottom: -8px;
      border: 3px solid transparent;
      border-top-color: #007AFF;
      border-right-color: #007AFF;
      border-radius: 26px;
      animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    .app-loader h2 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      color: #1D1D1F;
      letter-spacing: -0.03em;
    }
    .app-loader p {
      margin-top: 0.4rem;
      color: #8E8E93;
      font-size: 0.9rem;
      font-weight: 500;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
  </style>
</head>

<body>
  <app-root>
    <div class="app-loader">
      <div class="logo-container">
        <div class="spinner"></div>
        <img src="assets/images/logo.png" alt="TapHoa Logo">
      </div>
      <h2>Đang khởi tạo hệ thống...</h2>
      <p>Vui lòng chờ trong giây lát</p>
    </div>
  </app-root>
  <!-- Bootstrap JS bundle for Dropdowns, Modals, etc. -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>

</html>
