<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card glass-panel border-0 shadow-sm">
      <div class="card-header bg-transparent border-bottom-0 pt-4 pb-0">
        <div class="d-flex align-items-center">
          <a routerLink="/admin/stock-takes" class="btn btn-icon btn-light rounded-circle me-3">
            <i class="bi bi-arrow-left"></i>
          </a>
          <h4 class="mb-0 fw-bold">{{ 'STOCK_TAKE.TXT_17' | translate }}</h4>
        </div>
      </div>
      <div class="card-body p-4">
        <form [formGroup]="createForm" (ngSubmit)="onSubmit()">
          
          <div class="mb-4">
            <label class="form-label">{{ 'STOCK_TAKE.TXT_18' | translate }} <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-lg bg-light" formControlName="documentNo" readonly>
            <div class="form-text">{{ 'STOCK_TAKE.TXT_19' | translate }}</div>
          </div>

          <div class="mb-4">
            <label class="form-label">{{ 'STOCK_TAKE.TXT_20' | translate }}</label>
            <select class="form-select form-select-lg" formControlName="categoryId">
              <option [ngValue]="null">{{ 'STOCK_TAKE.TXT_21' | translate }}</option>
              <option *ngFor="let cat of categories" [value]="cat.id">
                Chỉ kiểm kê danh mục: {{ cat.name }}
              </option>
            </select>
            <div class="form-text">{{ 'STOCK_TAKE.TXT_22' | translate }}</div>
          </div>

          <div class="mb-4">
            <label class="form-label">{{ 'STOCK_TAKE.TXT_23' | translate }}</label>
            <textarea class="form-control" formControlName="notes" rows="3" [placeholder]="'STOCK_TAKE.TXT_25' | translate"></textarea>
          </div>

          <div class="d-grid mt-5">
            <button type="submit" class="btn btn-primary btn-lg rounded-pill" [disabled]="createForm.invalid || isSubmitting">
              <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              {{ 'STOCK_TAKE.TXT_24' | translate }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
