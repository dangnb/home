<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Nhà Cung Cấp</h2>
    <button (click)="openAddModal()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center transition-colors">
        <span class="mr-2">+</span> Thêm Nhà Cung Cấp
    </button>
</div>

<div class="bg-white rounded-lg shadow-sm border border-gray-200">
    <div class="p-4 border-b border-gray-200">
        <input type="text"
               [(ngModel)]="searchTerm"
               (input)="filterSuppliers()"
               placeholder="Tìm kiếm nhà cung cấp..."
               class="w-full md:w-1/3 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider">
                    <th class="p-4 font-semibold">Tên Nhà Cung Cấp</th>
                    <th class="p-4 font-semibold">SĐT</th>
                    <th class="p-4 font-semibold">Địa chỉ</th>
                    <th class="p-4 font-semibold text-right">Thao tác</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                <tr *ngFor="let supplier of filteredSuppliers" class="hover:bg-gray-50 transition-colors cursor-pointer" (dblclick)="openEditModal(supplier)">
                    <td class="p-4 font-medium text-gray-900">{{ supplier.fullName }}</td>
                    <td class="p-4 text-gray-600">{{ supplier.phoneNumber || '-' }}</td>
                    <td class="p-4 text-gray-600">{{ supplier.address || '-' }}</td>
                    <td class="p-4 text-right">
                        <button (click)="openEditModal(supplier)" class="text-indigo-600 hover:text-indigo-800 mr-3 transition-colors">Sửa</button>
                        <button (click)="deleteSupplier(supplier.id)" class="text-red-600 hover:text-red-800 transition-colors">Xóa</button>
                    </td>
                </tr>
                <tr *ngIf="filteredSuppliers.length === 0">
                    <td colspan="4" class="p-8 text-center text-gray-500">
                        Chưa có nhà cung cấp nào.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Thêm/Sửa Nhà Cung Cấp -->
<div *ngIf="isModalOpen" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50 flex items-center justify-center">
    <div class="relative bg-white rounded-lg shadow-xl w-full max-w-md mx-4 md:mx-0">
        <div class="flex justify-between items-center p-4 border-b">
            <h3 class="text-lg font-semibold text-gray-900">
                {{ isEditMode ? 'Cập Nhật Nhà Cung Cấp' : 'Thêm Nhà Cung Cấp Mới' }}
            </h3>
            <button (click)="closeModal()" class="text-gray-400 hover:text-gray-500 transition-colors">
                <span class="text-2xl">&times;</span>
            </button>
        </div>

        <form (ngSubmit)="saveSupplier()" class="p-4 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tên Nhà Cung Cấp *</label>
                <input type="text" [(ngModel)]="currentSupplier.fullName" name="fullName" required
                       class="w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
                <input type="text" [(ngModel)]="currentSupplier.phoneNumber" name="phoneNumber"
                       class="w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Địa chỉ</label>
                <input type="text" [(ngModel)]="currentSupplier.address" name="address"
                       class="w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú</label>
                <textarea [(ngModel)]="currentSupplier.notes" name="notes" rows="3"
                          class="w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500"></textarea>
            </div>

            <div class="mt-6 flex justify-end space-x-3">
                <button type="button" (click)="closeModal()"
                        class="px-4 py-2 border rounded-md text-gray-700 hover:bg-gray-50 transition-colors">
                    Hủy
                </button>
                <button type="submit" [disabled]="!currentSupplier.fullName"
                        class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 disabled:opacity-50 transition-colors">
                    Lưu
                </button>
            </div>
        </form>
    </div>
</div>
