<div class="modal-backdrop" (click)="onBackdropClick()" @fadeIn>
    <div class="modal-container" [ngClass]="'modal-' + size" (click)="$event.stopPropagation()" @slideUp>
        <div class="modal-panel">
            <!-- Header -->
            <div class="modal-panel-header">
                <div class="modal-title-group">
                    <h3 class="modal-panel-title">{{ title }}</h3>
                    @if (subtitle) {
                    <p class="modal-panel-subtitle">{{ subtitle }}</p>
                    }
                </div>
                <button type="button" class="modal-close-btn" aria-label="Đóng" (click)="closeDialog.emit()">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <!-- Body -->
            <div class="modal-panel-body" [class.no-padding]="noPadding">
                <ng-content></ng-content>
            </div>

            <!-- Footer (only rendered if projected content exists) -->
            <div class="modal-panel-footer">
                <ng-content select="[modal-footer]"></ng-content>
            </div>
        </div>
    </div>
</div>
