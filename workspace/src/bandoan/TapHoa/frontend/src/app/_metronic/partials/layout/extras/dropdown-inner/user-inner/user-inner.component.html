<ng-container *ngIf="user$ | async as _user">
  <div class="menu-item px-3">
    <div class="menu-content d-flex align-items-center px-3 py-3">
      <div class="symbol symbol-50px me-4">
        <span class="symbol-label bg-light-primary text-primary fw-bold fs-2">
          {{ getInitials(_user) }}
        </span>
      </div>
      <div class="d-flex flex-column">
        <span class="fw-bold text-gray-900 fs-5">{{ _user.fullName || (_user.firstname + ' ' + _user.lastname) }}</span>
        <span class="text-muted fs-7">{{ _user.email }}</span>
      </div>
    </div>
  </div>

  <div class="separator my-2"></div>

  <div class="menu-item px-5">
    <a (click)="openChangePassword()" class="menu-link px-5 cursor-pointer">
      <i class="bi bi-key me-3 fs-4 text-gray-500"></i>
      <span>Đổi mật khẩu</span>
    </a>
  </div>

  <div class="separator my-2"></div>

  <div class="menu-item px-5">
    <a (click)="logout()" class="menu-link px-5 cursor-pointer">
      <i class="bi bi-box-arrow-right me-3 fs-4 text-gray-500"></i>
      <span>Đăng xuất</span>
    </a>
  </div>
</ng-container>
