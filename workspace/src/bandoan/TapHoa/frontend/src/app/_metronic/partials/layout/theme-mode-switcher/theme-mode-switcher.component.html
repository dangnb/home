<!-- Simple toggle button - click to switch between light/dark mode -->
<ng-container *ngIf="mode$ | async as mode">
  <button
    type="button"
    class="btn btn-icon btn-theme-toggle"
    [ngClass]="toggleBtnClass"
    [title]="mode === 'dark' ? 'Chuyển sang chế độ sáng' : 'Chuyển sang chế độ tối'"
    (click)="toggleMode(mode)"
    id="kt_theme_mode_toggle">
    <i *ngIf="mode === 'light'" class="ki-duotone ki-moon fs-2" [ngClass]="toggleBtnIconClass">
      <span class="path1"></span>
      <span class="path2"></span>
    </i>
    <i *ngIf="mode === 'dark'" class="ki-duotone ki-night-day fs-2" [ngClass]="toggleBtnIconClass">
      <span class="path1"></span>
      <span class="path2"></span>
      <span class="path3"></span>
      <span class="path4"></span>
      <span class="path5"></span>
      <span class="path6"></span>
      <span class="path7"></span>
      <span class="path8"></span>
      <span class="path9"></span>
      <span class="path10"></span>
    </i>
  </button>
</ng-container>
