<div class="modal-content rounded">
  <div class="modal-header border-0 pb-0 px-10 pt-8">
    <div>
      <h3 class="fw-bold mb-1">Đổi mật khẩu</h3>
      <span class="text-muted fs-7">Nhập mật khẩu cũ và mật khẩu mới</span>
    </div>
    <div class="btn btn-sm btn-icon btn-active-color-primary" (click)="modal.dismiss()">
      <i class="ki-duotone ki-cross fs-1"><span class="path1"></span><span class="path2"></span></i>
    </div>
  </div>

  <div class="modal-body px-10 pt-5 pb-10">
    <!-- Success -->
    <div *ngIf="success" class="alert alert-success d-flex align-items-center mb-5">
      <i class="bi bi-check-circle-fill text-success me-3 fs-3"></i>
      <span>{{ success }}</span>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="alert alert-danger d-flex align-items-center mb-5">
      <i class="bi bi-exclamation-triangle-fill text-danger me-3 fs-3"></i>
      <span>{{ error }}</span>
    </div>

    <form (ngSubmit)="submit()">
      <!-- Mật khẩu cũ -->
      <div class="fv-row mb-6">
        <label class="form-label fw-semibold fs-6 mb-2">Mật khẩu hiện tại</label>
        <div class="position-relative">
          <input [type]="showOld ? 'text' : 'password'" class="form-control form-control-lg"
            placeholder="Nhập mật khẩu hiện tại" [(ngModel)]="oldPassword" name="oldPassword" autocomplete="current-password">
          <span class="btn btn-sm btn-icon position-absolute translate-middle-y top-50 end-0 me-2" (click)="toggleShow('old')">
            <i class="bi" [ngClass]="showOld ? 'bi-eye-slash' : 'bi-eye'"></i>
          </span>
        </div>
      </div>

      <!-- Mật khẩu mới -->
      <div class="fv-row mb-6">
        <label class="form-label fw-semibold fs-6 mb-2">Mật khẩu mới</label>
        <div class="position-relative">
          <input [type]="showNew ? 'text' : 'password'" class="form-control form-control-lg"
            placeholder="Nhập mật khẩu mới (tối thiểu 6 ký tự)" [(ngModel)]="newPassword" name="newPassword" autocomplete="new-password">
          <span class="btn btn-sm btn-icon position-absolute translate-middle-y top-50 end-0 me-2" (click)="toggleShow('new')">
            <i class="bi" [ngClass]="showNew ? 'bi-eye-slash' : 'bi-eye'"></i>
          </span>
        </div>
        <!-- Strength indicator -->
        <div class="mt-2" *ngIf="newPassword">
          <div class="d-flex gap-1">
            <div class="flex-grow-1 rounded h-5px" [ngClass]="newPassword.length >= 6 ? 'bg-success' : 'bg-secondary'"></div>
            <div class="flex-grow-1 rounded h-5px" [ngClass]="newPassword.length >= 8 ? 'bg-success' : 'bg-secondary'"></div>
            <div class="flex-grow-1 rounded h-5px" [ngClass]="newPassword.length >= 10 ? 'bg-success' : 'bg-secondary'"></div>
          </div>
          <span class="text-muted fs-8 mt-1">
            {{ newPassword.length < 6 ? 'Yếu' : newPassword.length < 8 ? 'Trung bình' : newPassword.length < 10 ? 'Mạnh' : 'Rất mạnh' }}
          </span>
        </div>
      </div>

      <!-- Xác nhận mật khẩu -->
      <div class="fv-row mb-8">
        <label class="form-label fw-semibold fs-6 mb-2">Xác nhận mật khẩu mới</label>
        <div class="position-relative">
          <input [type]="showConfirm ? 'text' : 'password'" class="form-control form-control-lg"
            placeholder="Nhập lại mật khẩu mới" [(ngModel)]="confirmPassword" name="confirmPassword" autocomplete="new-password">
          <span class="btn btn-sm btn-icon position-absolute translate-middle-y top-50 end-0 me-2" (click)="toggleShow('confirm')">
            <i class="bi" [ngClass]="showConfirm ? 'bi-eye-slash' : 'bi-eye'"></i>
          </span>
        </div>
        <div *ngIf="confirmPassword && confirmPassword !== newPassword" class="text-danger fs-8 mt-1">
          <i class="bi bi-x-circle me-1"></i> Mật khẩu không khớp
        </div>
        <div *ngIf="confirmPassword && confirmPassword === newPassword && newPassword" class="text-success fs-8 mt-1">
          <i class="bi bi-check-circle me-1"></i> Mật khẩu khớp
        </div>
      </div>

      <!-- Actions -->
      <div class="d-flex justify-content-end gap-3">
        <button type="button" class="btn btn-light" (click)="modal.dismiss()">Huỷ</button>
        <button type="submit" class="btn btn-primary" [disabled]="isLoading">
          <span *ngIf="!isLoading"><i class="bi bi-check-lg me-1"></i> Xác nhận</span>
          <span *ngIf="isLoading"><span class="spinner-border spinner-border-sm me-2"></span> Đang xử lý...</span>
        </button>
      </div>
    </form>
  </div>
</div>
